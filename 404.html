<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seite nicht gefunden · Döneria Dornbusch</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link href="assets/fonts/fonts.css" rel="stylesheet">
<style>
:root{--bg:#f7ecd9;--paper:#fbf5e8;--ink:#221b12;--ink-2:#6e6150;--red:#b3281a}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--ink);min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  font-family:"General Sans",system-ui,sans-serif;padding:24px;
}
h1{font-family:"Cabinet Grotesk",system-ui,sans-serif;font-weight:800;font-size:clamp(3rem,10vw,6rem);color:var(--red);line-height:1}
p{color:var(--ink-2);margin:16px 0 32px;font-size:1.05rem;max-width:40ch}
a{
  background:var(--red);color:var(--paper);font-weight:700;text-transform:uppercase;font-size:.9rem;letter-spacing:.03em;
  padding:16px 30px;border-radius:3px;border:2px solid var(--ink);text-decoration:none;
  box-shadow:4px 4px 0 var(--ink);transition:transform .15s,box-shadow .15s;
}
a:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
</style>
</head>
<body>
  <h1>404</h1>
  <p>Diese Seite gibt es nicht, aber unseren Döner gibt es garantiert. Zurück zur Startseite.</p>
  <a href="/doeneria-dornbusch/">Zur Startseite</a>
</body>
</html>
